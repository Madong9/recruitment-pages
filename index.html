    function safeHref(value) {
      const url = String(value || "");
      return /^https?:\/\//i.test(url) ? esc(url) : "#";
    }

    function fmtDate(value) {
      if (!value) return "未知日期";
      if (value.includes("T")) return shanghaiDateKey(value) || value.slice(0, 10);
      return value.slice(0, 10);
    }

    function fmtDateTime(value) {
      if (!value) return "未知时间";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value.replace("T", " ").replace(/\.\d+/, "").slice(0, 19);
      }
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hourCycle: "h23"
      }).format(date).replaceAll("/", "-");
    }

    function shanghaiDateKey(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(date);
      const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${values.year}-${values.month}-${values.day}`;
    }

    function renderUpdateSummary(meta) {
      const runs = meta.daily_updates || [];
      const latest = runs[0];
      if (!latest) return;
      const latestDay = shanghaiDateKey(latest.finished_at);
      const addedToday = runs
        .filter((run) => shanghaiDateKey(run.finished_at) === latestDay)
        .reduce((total, run) => total + Number(run.jobs_added || 0), 0);
      $("updateHeadline").textContent = `最近采集：${fmtDateTime(latest.finished_at)}`;
      $("updateSummary").textContent = latest.status === "ok"
        ? `今日新增 ${addedToday} 条 · 数据源 ${latest.sources_ok}/${latest.sources_total} 成功 · 已发布`
        : `本轮${statusText(latest.status)} · 数据源 ${latest.sources_ok}/${latest.sources_total} 成功 · 等待自动重试`;
    }

    function statusText(status) {
      if (status === "ok") return "成功";
      if (status === "warning") return "部分成功";
      if (status === "error") return "失败";
      return status || "未知";
    }

    function categoryClass(category) {
      if ((category || "").includes("实习")) return "category-intern";
      if ((category || "").includes("公告")) return "category-notice";
      if ((category || "").includes("校招")) return "category-job";
      return "";
    }

    function schoolClass(school) {
      const map = {
        "北京大学": "pku",
        "清华大学": "tsinghua",
        "复旦大学": "fudan",
        "上海交通大学": "sjtu",
        "浙江大学": "zju",
        "中国科学技术大学": "ustc",
        "南京大学": "nju"
      };
      return map[school] || "";
    }

    function inferOrgType(job) {
      const text = `${job.company || ""} ${job.title || ""} ${job.summary || ""}`.toLowerCase();
      if (/(外企|外资|合资|global|international|株式会社|有限公司上海代表处|中国区)/i.test(text)) return "外企";
      if (/(国企|央企|国有|国家电网|国网|中核|中石油|中石化|中国石油|中国石化|中国移动|中国电信|中国联通|中国建筑|中建|中国中铁|中铁|中国铁建|中航|航天科技|航天科工|兵器工业|中国烟草)/i.test(text)) return "国企";
      return "私企";
    }

    function filterJobs(items) {
      return items.filter((job) => job.school === state.school).slice(0, PAGE_SIZE);
    }

    function groupBySchool(items) {
      const groups = new Map();
      const schools = state.school ? [state.school] : allSchools;
      schools.forEach((school) => groups.set(school, []));
      items.forEach((job) => {
        if (!groups.has(job.school)) groups.set(job.school, []);
        groups.get(job.school).push(job);
      });
      return [...groups.entries()].filter(([, jobs]) => jobs.length || !state.school);
    }

    function buildSchoolPages(groups) {
      const pages = [];
      groups.forEach(([school, jobs]) => {
        const totalPages = Math.max(1, Math.ceil(jobs.length / PAGE_SIZE));
        for (let page = 1; page <= totalPages; page += 1) {
          const start = (page - 1) * PAGE_SIZE;
          pages.push({
            school,
            jobs,
            page,
            totalPages,
            pageItems: jobs.slice(start, start + PAGE_SIZE)
          });
        }
      });
      return pages;
    }

    function loadMeta() {
      const meta = OFFLINE_DATA;
      allSchools = meta.schools;
      if (!allSchools.includes(state.school) && allSchools.length) state.school = allSchools[0];
    }

    function fillSelect(select, values, firstText) {
      const current = select.value;
      select.innerHTML = `<option value="">${firstText}</option>` + values
        .map((value) => `<option value="${esc(value)}">${esc(value)}</option>`)
        .join("");
      select.value = current;
    }

    function loadJobs() {
      const filtered = filterJobs(allJobs);
      applySchoolBackground(state.school);
      $("currentSchoolName").textContent = state.school;
      $("resultCount").textContent = `${filtered.length} 条最新招聘`;
      $("jobList").innerHTML = filtered.length
        ? filtered.map(renderJob).join("")
        : `<div class="empty">没有匹配到招聘信息</div>`;
      document.querySelectorAll(".job").forEach((node) => {
        node.addEventListener("click", () => showDetail(Number(node.dataset.id)));
      });
      bindCardMotion();
      window.syncSchoolNavigation?.();
    }

    function renderBoard() {
      loadJobs();
    }

    function renderSchoolColumn(page) {
      return `
        <section class="school-column ${schoolClass(page.school)}">
          <div class="school-head">
            <h3>${esc(page.school)}</h3>
            <span>${page.jobs.length} 条 · <b class="school-page-mark">${page.page}/${page.totalPages}</b></span>
          </div>
          <div class="school-jobs">
            ${page.pageItems.length ? page.pageItems.map(renderJob).join("") : `<div class="empty">本页暂无</div>`}
          </div>
        </section>
      `;
    }

    function renderJob(job) {
      const company = job.company ? `<span>${esc(job.company)}</span>` : "";
      const location = job.location ? `<span>${esc(job.location)}</span>` : "";
      const salary = job.salary ? `<span>${esc(job.salary)}</span>` : "";
      return `
        <article class="job ${categoryClass(job.category)}" data-id="${job.id}">
          <div class="job-top">
            <span class="tag">${esc(job.category)}</span>
            <span class="date">${esc(fmtDate(job.published_at || job.last_seen_at))}</span>
          </div>
          <h3 class="job-title">${esc(job.title)}</h3>
          <div class="job-meta">
            <span>${esc(job.school)}</span>
            <span>${esc(inferOrgType(job))}</span>
            ${company}
            ${location}
            ${salary}
          </div>
        </article>
      `;
    }

    function showDetail(id) {
      const job = OFFLINE_DATA.jobs.find((item) => item.id === id);
      if (!job) return;
      $("detailTitle").textContent = job.title;
      $("detailBody").innerHTML = `
        <dl class="detail-grid">
          <dt>学校</dt><dd>${esc(job.school)}</dd>
          <dt>类型</dt><dd>${esc(job.category)}</dd>
          <dt>公司</dt><dd>${esc(job.company || "未识别")}</dd>
          <dt>单位性质</dt><dd>${esc(inferOrgType(job))}</dd>
          <dt>地点</dt><dd>${esc(job.location || "未标注")}</dd>
          <dt>薪资</dt><dd>${esc(job.salary || "未标注")}</dd>
          <dt>发布日期</dt><dd>${esc(fmtDate(job.published_at))}</dd>
          <dt>原网页</dt><dd><a href="${safeHref(job.url)}" target="_blank" rel="noreferrer">打开学校就业网详情</a></dd>
        </dl>
        <p>${esc(job.summary || job.content_text || "当前来源只提供列表信息，请打开原网页查看完整内容。")}</p>
      `;
      document.body.classList.add("detail-open");
      if (!$("detailDialog").open) $("detailDialog").show();
    }

    function debounce(fn, wait = 250) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    function applySchoolBackground(school) {
      const background = SCHOOL_BACKGROUNDS[state.school || school] || SCHOOL_BACKGROUNDS["*"];
      if (!background) {
        document.body.classList.remove("has-school-bg", "bg-wide", "bg-portrait");
        document.documentElement.style.setProperty("--school-bg-image", "none");
        return;
      }
      document.documentElement.style.setProperty("--school-bg-image", `url("${background.url}")`);
      document.body.classList.remove("bg-wide", "bg-portrait");
      document.body.classList.add("has-school-bg", background.mode === "wide" ? "bg-wide" : "bg-portrait");
    }

    function bindVisualEffects() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const root = document.documentElement;
      const hero = document.querySelector(".hero");
      const dogNode = $("whiteDog");
      const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false };
      const dog = {
        x: Math.min(window.innerWidth - 130, Math.max(18, window.innerWidth * 0.22)),
        y: Math.min(window.innerHeight - 86, Math.max(110, window.innerHeight * 0.72)),
        tx: window.innerWidth * 0.28,
        ty: window.innerHeight * 0.7,
        face: 1,
        mode: "playing",
        nextDecision: 0,
        phase: Math.random() * Math.PI * 2
      };

      function chooseDogTarget(now) {
        const margin = window.innerWidth < 720 ? 28 : 42;
        const top = window.innerWidth < 720 ? 120 : 140;
        dog.tx = margin + Math.random() * Math.max(20, window.innerWidth - margin * 2 - 96);
        dog.ty = top + Math.random() * Math.max(40, window.innerHeight - top - 106);
        dog.mode = Math.random() < 0.38 ? "playing" : "wandering";
        dog.nextDecision = now + 2200 + Math.random() * 3600;
      }

      function setDogMode(mode) {
        if (!dogNode) return;
        dog.mode = mode;
        dogNode.classList.toggle("is-chasing", mode === "chasing");
        dogNode.classList.toggle("is-playing", mode === "playing");
      }

      function animateDog(now) {
        if (!dogNode) return;
        const dx = mouse.x - dog.x;
        const dy = mouse.y - dog.y;
        const dist = Math.hypot(dx, dy);
        let speed = 0.012;

        if (mouse.active && dist < 210) {
          setDogMode("chasing");
          const lag = window.innerWidth < 720 ? 38 : 58;
          dog.tx = mouse.x - Math.sign(dx || dog.face) * lag;
          dog.ty = mouse.y + 24;
          speed = 0.052;
        } else if (mouse.active && dist < 560) {
          setDogMode("watching");
          dog.tx = dog.x;
          dog.ty = dog.y;
          speed = 0.006;
        } else {
          if (now > dog.nextDecision) chooseDogTarget(now);
          setDogMode(dog.mode === "playing" ? "playing" : "wandering");
          speed = dog.mode === "playing" ? 0.01 : 0.016;
        }

        const maxX = window.innerWidth - 106;
        const maxY = window.innerHeight - 76;
        dog.tx = Math.min(maxX, Math.max(12, dog.tx));
        dog.ty = Math.min(maxY, Math.max(92, dog.ty));
        dog.x += (dog.tx - dog.x) * speed;
        dog.y += (dog.ty - dog.y) * speed;

        const lookX = mouse.active ? Math.max(-2.4, Math.min(2.4, dx / 90)) : Math.sin(now / 1200 + dog.phase) * 1.4;
        const lookY = mouse.active ? Math.max(-1.5, Math.min(1.5, dy / 120)) : Math.cos(now / 1500 + dog.phase) * 0.8;
        if (Math.abs(dx) > 18) dog.face = dx >= 0 ? 1 : -1;
        const bob = dog.mode === "chasing" ? Math.sin(now / 90) * 2.4 : dog.mode === "playing" ? Math.sin(now / 360 + dog.phase) * 1.2 : 0;
        root.style.setProperty("--dog-x", `${dog.x.toFixed(1)}px`);
        root.style.setProperty("--dog-y", `${(dog.y + bob).toFixed(1)}px`);
        root.style.setProperty("--dog-face", dog.face);
        root.style.setProperty("--dog-look", `${Math.max(-10, Math.min(10, dy / 18)).toFixed(1)}deg`);
        root.style.setProperty("--dog-eye-x", `${lookX.toFixed(1)}px`);
        root.style.setProperty("--dog-eye-y", `${lookY.toFixed(1)}px`);
      }

      function animateScene(now) {
        animateDog(now);
        requestAnimationFrame(animateScene);
      }

      requestAnimationFrame(animateScene);

      window.addEventListener("pointermove", (event) => {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
        mouse.active = true;
        if (hero) {
          const x = (event.clientX / window.innerWidth - 0.5) * 8;
          const y = (event.clientY / window.innerHeight - 0.5) * 6;
          hero.style.setProperty("--hero-x", x.toFixed(2));
          hero.style.setProperty("--hero-y", y.toFixed(2));
        }
      }, { passive: true });
      window.addEventListener("pointerleave", () => {
        mouse.active = false;
      });
    }

    function bindCardMotion() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      document.querySelectorAll(".job, .school-column").forEach((node) => {
        node.addEventListener("pointermove", (event) => {
          const rect = node.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          node.style.setProperty("--spot-x", `${x}px`);
          node.style.setProperty("--spot-y", `${y}px`);
          if (node.classList.contains("job")) {
            const rotateX = ((y / rect.height) - 0.5) * -2.4;
            const rotateY = ((x / rect.width) - 0.5) * 2.4;
            node.style.transform = `translateY(-2px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg)`;
          }
        }, { passive: true });
        node.addEventListener("pointerleave", () => {
          node.style.removeProperty("--spot-x");
          node.style.removeProperty("--spot-y");
          if (node.classList.contains("job")) {
            node.style.transform = "";
          }
        });
      });
    }

    function bindGravityEffect() {
      const canvas = $("gravityCanvas");
      if (!canvas || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const ctx = canvas.getContext("2d", { alpha: true });
      if (!ctx) return;

      const palette = [
        [66, 133, 244],
        [52, 168, 83],
        [251, 188, 4],
        [234, 67, 53],
        [112, 86, 214],
        [46, 181, 196]
      ];
      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        centerX: 0,
        centerY: 0,
        targetX: 0,
        targetY: 0,
        pointerX: -1000,
        pointerY: -1000,
        pointerActive: false,
        baseRadius: 0,
        particles: []
      };

      function createParticles(count) {
        state.particles = Array.from({ length: count }, (_, index) => {
          const band = index % 4;
          return {
            angle: Math.random() * Math.PI * 2,
            radiusOffset: (Math.random() - 0.5) * (band === 0 ? 0.34 : 0.2),
            bandScale: [1, 0.82, 1.13, 0.94][band],
            speed: (0.000018 + Math.random() * 0.000026) * (band % 2 ? -1 : 1),
            phase: Math.random() * Math.PI * 2,
            wobble: 0.018 + Math.random() * 0.052,
            size: 0.65 + Math.random() * 1.65,
            alpha: 0.28 + Math.random() * 0.52,
            color: palette[(index + Math.floor(Math.random() * 3)) % palette.length]
          };
        });
      }

      function resize() {
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        const mobile = state.width < 720;
        state.centerX = state.width * 0.5;
        state.centerY = mobile ? state.height * 0.38 : state.height * 0.46;
        state.targetX = state.centerX;
        state.targetY = state.centerY;
        state.baseRadius = mobile
          ? Math.min(state.width * 0.43, state.height * 0.28)
          : Math.min(state.width * 0.31, state.height * 0.38);
        createParticles(mobile ? 104 : state.width > 1280 ? 230 : 172);
      }

      function drawOrbitalGuides(now) {
        const pulse = 1 + Math.sin(now * 0.00034) * 0.016;
        ctx.save();
        ctx.translate(state.centerX, state.centerY);
        ctx.rotate(Math.sin(now * 0.00012) * 0.08);
        for (let i = 0; i < 3; i += 1) {
          ctx.beginPath();
          ctx.ellipse(
            0,
            0,
            state.baseRadius * pulse * (0.82 + i * 0.155),
            state.baseRadius * pulse * (0.57 + i * 0.105),
            i * 0.54,
            0,
            Math.PI * 2
          );
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.09 - i * 0.018})`;
          ctx.lineWidth = 0.75;
          ctx.stroke();
        }
        ctx.restore();
      }

      function frame(now) {
        ctx.clearRect(0, 0, state.width, state.height);
        const homeX = state.width * 0.5;
        const homeY = state.width < 720 ? state.height * 0.38 : state.height * 0.46;
        state.targetX = homeX + (state.pointerActive ? (state.pointerX - homeX) * 0.024 : 0);
        state.targetY = homeY + (state.pointerActive ? (state.pointerY - homeY) * 0.018 : 0);
        state.centerX += (state.targetX - state.centerX) * 0.035;
        state.centerY += (state.targetY - state.centerY) * 0.035;
        drawOrbitalGuides(now);

        const pulse = 1 + Math.sin(now * 0.00042) * 0.026;
        for (const particle of state.particles) {
          const angle = particle.angle + now * particle.speed;
          const wave = Math.sin(now * 0.00068 + particle.phase) * particle.wobble;
          const radius = state.baseRadius * particle.bandScale * pulse
            * (1 + particle.radiusOffset + wave);
          const depth = (Math.sin(angle + particle.phase * 0.18) + 1) * 0.5;
          const tilt = 0.68 + particle.bandScale * 0.035;
          let x = state.centerX + Math.cos(angle) * radius;
          let y = state.centerY + Math.sin(angle) * radius * tilt
            + Math.sin(now * 0.00055 + particle.phase) * 6;

          if (state.pointerActive) {
            const dx = x - state.pointerX;
            const dy = y - state.pointerY;
            const distance = Math.hypot(dx, dy);
            const influence = 132;
            if (distance > 0 && distance < influence) {
              const force = (1 - distance / influence) ** 2 * 25;
              x += (dx / distance) * force;
              y += (dy / distance) * force;
            }
          }

          const [red, green, blue] = particle.color;
          const alpha = particle.alpha * (0.5 + depth * 0.5);
          const size = particle.size * (0.68 + depth * 0.58);
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${alpha})`;
          ctx.fill();
        }

        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize, { passive: true });
      window.addEventListener("pointermove", (event) => {
        state.pointerX = event.clientX;
        state.pointerY = event.clientY;
        state.pointerActive = true;
      }, { passive: true });
      window.addEventListener("pointerleave", () => {
        state.pointerActive = false;
      });
      resize();
      requestAnimationFrame(frame);
    }

    function bindLineFieldEffect() {
      const canvas = $("lineFieldCanvas");
      if (!canvas || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const ctx = canvas.getContext("2d", { alpha: true });
      const source = SCHOOL_BACKGROUNDS["*"]?.url;
      if (!ctx || !source) return;

      const image = new Image();
      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        pointerX: 0,
        pointerY: 0,
        targetX: 0,
        targetY: 0,
        pointerActive: false,
        activity: 0,
        segments: []
      };

      function isBluePixel(data, index) {
        const red = data[index];
        const green = data[index + 1];
        const blue = data[index + 2];
        return data[index + 3] > 24
          && blue > 92
          && blue - red > 24
          && blue - green > 8;
      }

      function sampleImage() {
        if (!image.naturalWidth || !image.naturalHeight) return;
        const sampleWidth = state.width < 720 ? 154 : 224;
        const sampleHeight = Math.max(1, Math.round(sampleWidth * image.naturalHeight / image.naturalWidth));
        const sample = document.createElement("canvas");
        const sampleCtx = sample.getContext("2d", { willReadFrequently: true });
        if (!sampleCtx) return;
        sample.width = sampleWidth;
        sample.height = sampleHeight;
        sampleCtx.drawImage(image, 0, 0, sampleWidth, sampleHeight);

        let pixels;
        try {
          pixels = sampleCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;
        } catch (error) {
          console.warn("Background line sampling is unavailable", error);
          return;
        }

        const candidates = [];
        const indexAt = (x, y) => (y * sampleWidth + x) * 4;
        const tangentAt = (x, y) => {
          let xx = 0;
          let yy = 0;
          let xy = 0;
          let count = 0;
          for (let offsetY = -4; offsetY <= 4; offsetY += 1) {
            for (let offsetX = -4; offsetX <= 4; offsetX += 1) {
              if (!isBluePixel(pixels, indexAt(x + offsetX, y + offsetY))) continue;
              xx += offsetX * offsetX;
              yy += offsetY * offsetY;
              xy += offsetX * offsetY;
              count += 1;
            }
          }
          return count > 2 ? 0.5 * Math.atan2(2 * xy, xx - yy) : 0;
        };
        for (let y = 2; y < sampleHeight - 2; y += 2) {
          for (let x = 2; x < sampleWidth - 2; x += 2) {
            const index = indexAt(x, y);
            if (!isBluePixel(pixels, index)) continue;
            const hash = ((x * 73856093) ^ (y * 19349663)) >>> 0;
            candidates.push({
              nx: x / sampleWidth,
              ny: y / sampleHeight,
              tangent: tangentAt(x, y),
              phase: (hash % 6283) / 1000,
              length: 11 + (hash % 13),
              hash,
              gridX: Math.floor(x / 6),
              gridY: Math.floor(y / 6)
            });
          }
        }

        candidates.sort((left, right) => left.hash - right.hash);
        const occupied = new Set();
        const limit = state.width < 720 ? 68 : 132;
        state.segments = [];
        for (const candidate of candidates) {
          const key = `${candidate.gridX}:${candidate.gridY}`;
          let crowded = false;
          for (let offsetY = -1; offsetY <= 1 && !crowded; offsetY += 1) {
            for (let offsetX = -1; offsetX <= 1; offsetX += 1) {
              if (occupied.has(`${candidate.gridX + offsetX}:${candidate.gridY + offsetY}`)) {
                crowded = true;
                break;
              }
            }
          }
          if (crowded) continue;
          occupied.add(key);
          state.segments.push(candidate);
          if (state.segments.length >= limit) break;
        }
        canvas.dataset.sampleCount = String(state.segments.length);
      }

      function resize() {
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        if (!state.pointerX && !state.pointerY) {
          state.pointerX = state.targetX = state.width / 2;
          state.pointerY = state.targetY = state.height / 2;
        }
        sampleImage();
      }

      function backgroundMetrics() {
        const mobile = state.width <= 720;
        const scale = mobile
          ? Math.max(state.width / image.naturalWidth, state.height / image.naturalHeight)
          : state.width / image.naturalWidth;
        const renderedWidth = image.naturalWidth * scale;
        const renderedHeight = image.naturalHeight * scale;
        return {
          left: mobile ? (state.width - renderedWidth) / 2 : 0,
          top: mobile ? (state.height - renderedHeight) / 2 : -window.scrollY,
          renderedWidth,
          renderedHeight
        };
      }

      function drawSegment(segment, anchorX, anchorY, strength, now) {
        const tangentX = Math.cos(segment.tangent);
        const tangentY = Math.sin(segment.tangent);
        const normalX = -tangentY;
        const normalY = tangentX;
        const distanceX = state.pointerX - anchorX;
        const distanceY = state.pointerY - anchorY;
        const distance = Math.max(1, Math.hypot(distanceX, distanceY));
        const pull = strength * (state.width < 720 ? 15 : 22);
        const wave = Math.sin(now * 0.0042 + segment.phase) * strength * 5.5;
        const controlX = anchorX + distanceX / distance * pull + normalX * wave;
        const controlY = anchorY + distanceY / distance * pull + normalY * wave;
        const length = segment.length * (0.82 + strength * 0.42);
        const startX = anchorX - tangentX * length;
        const startY = anchorY - tangentY * length;
        const endX = anchorX + tangentX * length;
        const endY = anchorY + tangentY * length;

        ctx.beginPath();
        ctx.moveTo(startX + 3.5 * strength, startY + 5 * strength);
        ctx.quadraticCurveTo(controlX + 5 * strength, controlY + 8 * strength, endX + 3.5 * strength, endY + 5 * strength);
        ctx.strokeStyle = `rgba(15, 36, 72, ${0.08 + strength * 0.2})`;
        ctx.lineWidth = 1.8 + strength * 2.1;
        ctx.stroke();

        ctx.save();
        ctx.shadowColor = `rgba(36, 122, 224, ${strength * 0.72})`;
        ctx.shadowBlur = 5 + strength * 13;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(controlX, controlY, endX, endY);
        ctx.strokeStyle = `rgba(27, 103, 210, ${0.18 + strength * 0.74})`;
        ctx.lineWidth = 0.8 + strength * 1.6;
        ctx.stroke();
        ctx.restore();

        ctx.beginPath();
        ctx.moveTo(startX - normalX, startY - normalY);
        ctx.quadraticCurveTo(controlX - normalX * 1.7, controlY - normalY * 1.7, endX - normalX, endY - normalY);
        ctx.strokeStyle = `rgba(205, 239, 255, ${strength * 0.62})`;
        ctx.lineWidth = 0.65;
        ctx.stroke();
      }

      function frame(now) {
        ctx.clearRect(0, 0, state.width, state.height);
        state.pointerX += (state.targetX - state.pointerX) * 0.18;
        state.pointerY += (state.targetY - state.pointerY) * 0.18;
        state.activity += ((state.pointerActive ? 1 : 0) - state.activity) * 0.1;

        if (state.activity > 0.01 && image.naturalWidth && state.segments.length) {
          const metrics = backgroundMetrics();
          const influence = state.width < 720 ? 142 : 205;
          ctx.lineCap = "round";
          for (const segment of state.segments) {
            const anchorX = metrics.left + segment.nx * metrics.renderedWidth;
            const anchorY = metrics.top + segment.ny * metrics.renderedHeight;
            if (anchorX < -influence || anchorX > state.width + influence
              || anchorY < -influence || anchorY > state.height + influence) continue;
            const distance = Math.hypot(anchorX - state.pointerX, anchorY - state.pointerY);
            if (distance >= influence) continue;
            const strength = (1 - distance / influence) ** 2 * state.activity;
            if (strength > 0.012) drawSegment(segment, anchorX, anchorY, strength, now);
          }
        }
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize, { passive: true });
      window.addEventListener("pointermove", (event) => {
        state.targetX = event.clientX;
        state.targetY = event.clientY;
        state.pointerActive = true;
      }, { passive: true });
      window.addEventListener("pointerdown", (event) => {
        state.targetX = event.clientX;
        state.targetY = event.clientY;
        state.pointerActive = true;
      }, { passive: true });
      window.addEventListener("pointerleave", () => {
        state.pointerActive = false;
      });
      window.addEventListener("pointerup", (event) => {
        if (event.pointerType === "touch") state.pointerActive = false;
      }, { passive: true });

      image.addEventListener("load", () => {
        sampleImage();
        canvas.dataset.ready = "true";
      });
      image.addEventListener("error", () => {
        canvas.hidden = true;
      });
      resize();
      image.src = source;
      requestAnimationFrame(frame);
    }

    function bindWeatherEffect() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const canvas = $("weatherCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const state = { width: 0, height: 0, dpr: 1, rain: [], leaves: [] };
      const mapleLeafImage = new Image();
      mapleLeafImage.src = MAPLE_LEAF_IMAGE_SRC;

      function resize() {
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        const isMobile = state.width < 720;
        const rainCount = isMobile ? 58 : 118;
        state.rain = Array.from({ length: rainCount }, () => ({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          len: 12 + Math.random() * 18,
          speed: 5 + Math.random() * 7,
          drift: -1.4 + Math.random() * 0.8,
          alpha: 0.12 + Math.random() * 0.18
        }));
      }

      function spawnMapleLeaf() {
        if (state.leaves.length > (state.width < 720 ? 6 : 12)) return;
        const warm = Math.random();
        state.leaves.push({
          x: Math.random() * state.width,
          y: -28,
          size: 12 + Math.random() * 12,
          speed: 0.38 + Math.random() * 0.62,
          drift: -0.45 + Math.random() * 1.05,
          spin: Math.random() * Math.PI * 2,
          spinSpeed: 0.01 + Math.random() * 0.022,
          sway: Math.random() * Math.PI * 2,
          alpha: 0.54 + Math.random() * 0.26,
          fill: warm < 0.33 ? "rgba(190, 54, 38, 0.82)" : warm < 0.66 ? "rgba(224, 99, 42, 0.8)" : "rgba(194, 116, 36, 0.78)",
          stroke: warm < 0.33 ? "rgba(126, 38, 32, 0.5)" : "rgba(132, 71, 30, 0.48)"
        });
      }

      function drawMapleLeaf(leaf) {
        ctx.save();
        ctx.translate(leaf.x, leaf.y);
        ctx.rotate(leaf.spin);
        ctx.globalAlpha = leaf.alpha;
        if (mapleLeafImage.complete && mapleLeafImage.naturalWidth) {
          const width = leaf.size * 2.25;
          const height = width * (mapleLeafImage.naturalHeight / mapleLeafImage.naturalWidth);
          ctx.drawImage(mapleLeafImage, -width / 2, -height / 2, width, height);
          ctx.restore();
          return;
        }
        ctx.scale(leaf.size, leaf.size);
        ctx.fillStyle = leaf.fill;
        ctx.strokeStyle = leaf.stroke;
        ctx.lineWidth = 0.055;
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(0, -1.15);
        ctx.lineTo(0.14, -0.62);
        ctx.lineTo(0.42, -0.98);
        ctx.lineTo(0.38, -0.52);
        ctx.lineTo(0.82, -0.7);
        ctx.lineTo(0.56, -0.28);
        ctx.lineTo(1.03, -0.18);
        ctx.lineTo(0.56, 0.02);
        ctx.lineTo(0.75, 0.45);
        ctx.lineTo(0.28, 0.28);
        ctx.lineTo(0.17, 0.8);
        ctx.lineTo(0, 0.42);
        ctx.lineTo(-0.17, 0.8);
        ctx.lineTo(-0.28, 0.28);
        ctx.lineTo(-0.75, 0.45);
        ctx.lineTo(-0.56, 0.02);
        ctx.lineTo(-1.03, -0.18);
        ctx.lineTo(-0.56, -0.28);
        ctx.lineTo(-0.82, -0.7);
        ctx.lineTo(-0.38, -0.52);
        ctx.lineTo(-0.42, -0.98);
        ctx.lineTo(-0.14, -0.62);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "rgba(116, 63, 31, 0.45)";
        ctx.lineWidth = 0.045;
        ctx.beginPath();
        ctx.moveTo(0, 0.42);
        ctx.lineTo(0, 1.12);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 0.14);
        ctx.lineTo(0.48, -0.34);
        ctx.moveTo(0, 0.14);
        ctx.lineTo(-0.48, -0.34);
        ctx.moveTo(0, -0.02);
        ctx.lineTo(0, -0.7);
        ctx.stroke();
        ctx.restore();
      }

      function frame(now) {
        ctx.clearRect(0, 0, state.width, state.height);
        ctx.lineCap = "round";

        for (const rain of state.rain) {
          rain.x += rain.drift;
          rain.y += rain.speed;
          if (rain.y > state.height + rain.len) {
            rain.x = Math.random() * state.width;
            rain.y = -rain.len;
          }
          if (rain.x < -20) rain.x = state.width + 20;
          ctx.strokeStyle = `rgba(218, 241, 255, ${rain.alpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(rain.x, rain.y);
          ctx.lineTo(rain.x + rain.drift * 5, rain.y + rain.len);
          ctx.stroke();
        }

        if (Math.random() < (state.width < 720 ? 0.009 : 0.016)) spawnMapleLeaf();
        state.leaves = state.leaves.filter((leaf) => leaf.y < state.height + 40);
        for (const leaf of state.leaves) {
          leaf.y += leaf.speed;
          leaf.x += leaf.drift + Math.sin(now / 850 + leaf.sway) * 0.42;
          leaf.spin += leaf.spinSpeed + Math.sin(now / 1200 + leaf.sway) * 0.0015;
          drawMapleLeaf(leaf);
        }

        requestAnimationFrame(frame);
      }

      resize();
      window.addEventListener("resize", resize, { passive: true });
      requestAnimationFrame(frame);
    }

    function bindEvents() {
      const closeDetail = () => {
        $("detailDialog").close();
        document.body.classList.remove("detail-open");
      };
      $("closeDialog").addEventListener("click", closeDetail);
      $("detailBackdrop").addEventListener("click", closeDetail);
      $("detailDialog").addEventListener("close", () => document.body.classList.remove("detail-open"));
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && $("detailDialog").open) closeDetail();
      });
    }

    function bindLiquidNavigation() {
      const layerSelectors = [
        ".liquid-nav",
        ".liquid-dropdown",
        ".jobs",
        ".school-menu",
        ".job"
      ].join(",");

      function hydrateLiquidGlass(scope = document) {
        scope.querySelectorAll(layerSelectors).forEach((surface) => {
          if (surface.dataset.liquidReady === "true") return;
          surface.classList.add("liquid-glass");
          const clone = document.createElement("div");
          const tint = document.createElement("div");
          const glint = document.createElement("div");
          clone.className = "liquid-clone";
          tint.className = "liquid-tint";
          glint.className = "liquid-glint";
          clone.setAttribute("aria-hidden", "true");
          tint.setAttribute("aria-hidden", "true");
          glint.setAttribute("aria-hidden", "true");
          surface.prepend(glint);
          surface.prepend(tint);
          surface.prepend(clone);
          surface.dataset.liquidReady = "true";
        });
      }

      function syncSchoolMenus() {
        document.querySelectorAll("[data-school-menu]").forEach((menu) => {
          const jobs = allJobs.filter((job) => job.school === menu.dataset.school).slice(0, PAGE_SIZE);
          const signature = jobs.map((job) => job.id).join("\u0001");
          if (menu.dataset.categorySignature === signature) return;
          menu.dataset.categorySignature = signature;
          const optionsRoot = menu.querySelector(".menu-options");
          optionsRoot.replaceChildren(...jobs.map((job) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "menu-option";
            button.dataset.jobId = job.id;
            button.title = job.title;
            button.textContent = job.title;
            return button;
          }));
        });
        document.querySelectorAll("[data-school-menu]").forEach((menu) => {
          const current = menu.dataset.school === state.school;
          menu.classList.toggle("is-current", current);
        });
      }

      document.querySelectorAll("[data-school-menu]").forEach((menu) => {
        const dropdown = menu.querySelector(".liquid-dropdown");
        menu.addEventListener("toggle", () => {
          if (!menu.open) {
            if (dropdown?.parentElement !== menu) {
              dropdown.classList.remove("school-dropdown-portal");
              menu.append(dropdown);
            }
            return;
          }
          document.querySelectorAll("[data-school-menu][open]").forEach((other) => {
            if (other !== menu) other.removeAttribute("open");
          });
          if (state.school !== menu.dataset.school) {
            state.school = menu.dataset.school;
            renderBoard();
          }
          syncSchoolMenus();
          hydrateLiquidGlass(menu);
          if (dropdown && window.innerWidth <= 900) {
            dropdown.classList.add("school-dropdown-portal");
            document.body.append(dropdown);
          }
        });
        dropdown?.addEventListener("click", (event) => {
          const button = event.target.closest("[data-job-id]");
          if (!button) return;
          state.school = menu.dataset.school;
          menu.removeAttribute("open");
          syncSchoolMenus();
          renderBoard();
          showDetail(Number(button.dataset.jobId));
        });
      });

      document.addEventListener("pointerdown", (event) => {
        if (event.target.closest("[data-school-menu], .school-dropdown-portal")) return;
        document.querySelectorAll("[data-school-menu][open]").forEach((menu) => menu.removeAttribute("open"));
      }, { passive: true });

      const jobList = $("jobList");
      if (jobList) {
        new MutationObserver(() => hydrateLiquidGlass(document)).observe(jobList, { childList: true });
      }

      hydrateLiquidGlass(document);
      window.syncSchoolNavigation = syncSchoolMenus;
      syncSchoolMenus();
    }

    bindEvents();
    bindLiquidNavigation();
    loadMeta();
    loadJobs();
  </script>
</body>
</html>
